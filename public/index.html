<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quest of Mesh 3 — Ruler of Worlds</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<canvas id="game"></canvas>

<div id="title" class="screen">
    <h1>QUEST OF MESH 3</h1>
    <p class="sub">Ruler of Worlds</p>
    <p class="sub2">You have the Mesh. Now conquer everything.</p>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center;width:260px;">
        <input type="text" id="login-user" placeholder="Username" style="width:100%;padding:9px;background:rgba(255,255,255,.05);border:1px solid #444;border-radius:6px;color:#fff;font-size:13px;text-align:center;">
        <input type="password" id="login-pass" placeholder="Password" style="width:100%;padding:9px;background:rgba(255,255,255,.05);border:1px solid #444;border-radius:6px;color:#fff;font-size:13px;text-align:center;">
        <div id="login-err" style="color:#f44;font-size:10px;min-height:14px;"></div>
        <button class="btn" onclick="Game.login()" style="width:100%">LOG IN</button>
        <button class="btn" onclick="Game.register()" style="width:100%;background:linear-gradient(135deg,#44ffaa,#00aa66);font-size:13px;padding:10px;">CREATE ACCOUNT</button>
    </div>
    <p style="color:#444;font-size:9px;margin-top:12px;">PS5/PS4 controller supported | Press 9 for PVP</p>
</div>

<div id="avatar-screen" class="screen hidden">
    <h2>YOUR AVATAR</h2>
    <canvas id="avp" width="140" height="220"></canvas>
    <div id="av-opts"></div>
    <button class="btn" onclick="Game.play()">ENTER THE MULTIVERSE</button>
</div>

<div id="hud">
    <div class="hud-top">
        <div class="hbar"><div class="blbl">HP</div><div class="bbg"><div id="hp"></div></div></div>
        <div class="hbar"><div class="blbl">SP</div><div class="bbg sp"><div id="sp"></div></div></div>
        <div class="hbar"><div class="blbl">ME</div><div class="bbg me"><div id="me"></div></div></div>
    </div>
    <div id="info"></div>
    <div id="world-name"></div>
    <div id="qbox"></div>
    <div id="combo"></div>
</div>

<div id="dlg"><div id="dp"></div><div><div id="dn"></div><div id="dt"></div></div><div id="ds">[ Space ]</div></div>
<div id="shop-panel"></div>
<div id="notif"><h2></h2><p></p></div>
<div id="msgs"></div>
<script src="game.js"></script>
</body>
</html>
