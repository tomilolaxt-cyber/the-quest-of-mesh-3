<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quest of Mesh 3 — Ruler of Worlds</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<canvas id="game"></canvas>

<div id="title" class="screen">
    <h1>QUEST OF MESH 3</h1>
    <p class="sub">Ruler of Worlds</p>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center;width:260px;">
        <input type="text" id="login-user" placeholder="Enter your name" maxlength="16" autocomplete="off" style="width:100%;padding:10px;background:rgba(255,255,255,.06);border:1px solid #555;border-radius:8px;color:#fff;font-size:14px;text-align:center;">
        <div id="login-err" style="color:#f44;font-size:10px;min-height:14px;"></div>
        <button class="btn" onclick="Game.goSolo()" style="width:100%">⚔️ SOLO PLAY</button>
        <button class="btn" onclick="Game.showMP()" style="width:100%;background:linear-gradient(135deg,#44ffaa,#00aa66);">🌐 MULTIPLAYER</button>
    </div>
    <!-- Multiplayer options (hidden initially) -->
    <div id="mp-box" style="display:none;flex-direction:column;gap:6px;align-items:center;width:260px;margin-top:10px;">
        <button class="btn" onclick="Game.createRoom()" style="width:100%;background:linear-gradient(135deg,#ffaa00,#cc6600);">CREATE ROOM (get code)</button>
        <div style="display:flex;gap:6px;width:100%;">
            <input type="text" id="join-code" placeholder="Enter room code" maxlength="6" autocomplete="off" style="flex:1;padding:9px;background:rgba(255,255,255,.06);border:1px solid #555;border-radius:8px;color:#fff;font-size:14px;text-align:center;text-transform:uppercase;">
            <button class="btn" onclick="Game.joinRoom()" style="padding:9px 16px;font-size:13px;">JOIN</button>
        </div>
        <div id="room-status" style="color:#ffaa00;font-size:11px;min-height:16px;text-align:center;"></div>
    </div>
    <p style="color:#444;font-size:9px;margin-top:14px;">PS5/PS4 controller supported</p>
</div>

<div id="avatar-screen" class="screen hidden">
    <h2>YOUR AVATAR</h2>
    <canvas id="avp" width="140" height="220"></canvas>
    <div id="av-opts"></div>
    <button class="btn" onclick="Game.play()">ENTER THE MULTIVERSE</button>
</div>

<div id="hud">
    <div class="hud-top">
        <div class="hbar"><div class="blbl">HP</div><div class="bbg"><div id="hp"></div></div></div>
        <div class="hbar"><div class="blbl">SP</div><div class="bbg sp"><div id="sp"></div></div></div>
        <div class="hbar"><div class="blbl">ME</div><div class="bbg me"><div id="me"></div></div></div>
    </div>
    <div id="info"></div>
    <div id="world-name"></div>
    <div id="qbox"></div>
    <div id="combo"></div>
</div>

<div id="dlg"><div id="dp"></div><div><div id="dn"></div><div id="dt"></div></div><div id="ds">[ Space ]</div></div>
<div id="shop-panel"></div>
<div id="notif"><h2></h2><p></p></div>
<div id="msgs"></div>
<script src="game.js"></script>
</body>
</html>
